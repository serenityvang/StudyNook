<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/trial2.png" /> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/styles/main.css" />
    <link rel="stylesheet" href="/src/styles/navbar.css" />
    <link rel="preconnect" href="https://fontshare.com" crossorigin>
    <link href="https://api.fontshare.com/v2/css?f[]=gambetta@400&f[]=general-sans@600&display=swap" rel="stylesheet">
    <link rel="import" href="component.html">
    <title>StudyNook | Find Your Study Spot</title>
    
  </head>
  <body>

    <nav id="navbar"></nav>


    <div class="landing-hero">
      <p class="landing-top">🎓 For students, by students</p>
      <h1 class="landing-headline">Find your perfect<br><em>study spot</em></h1>
      <p class="landing-subline">Discover the best place to study on and around your campus - rated by students like you.</p>

      <div class="search-container">
        <div class="search-bar">
          <input 
            type="text"
            id="schoolSearch" 
            placeholder="Find your university..."
            autocomplete="off"
          
          />
            <button type="button" class="btn btn-primary">Search</button>
        </div>
        <div class="search-dropdown" id="searchDropdown"></div>
      </div>
    </div>
      <div class="schools-section">
        <div class="schools-header">
          <p class="schools-label"> 🏛️ Browse by campus</p>
          <div class="carousel-arrows">
            <button class="arrow-btn" id="arrowLeft">←</button>
            <button class="arrow-btn" id="arrowRight">→</button>
          </div>
        </div>

        <div class="schools-scroll-wrap">
          <div class="schools-row" id="schoolsRow"></div>
        </div>
      </div>
    </div>



    <script type="module" src="/src/pages/landing.js"></script>
  </body>
</html>
