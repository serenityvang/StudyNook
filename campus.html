<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="main.css" />
    <link rel="stylesheet" href="navbar.css" />
    <link rel="stylesheet" href="cards.css" />

    <nav id="navbar"></nav>

    <!-- campus header -->

    </div>

    <!-- filter bar -->
    <div id="filter-bar">
        <span class="fitler-label">Filter:</span>
        <div id="filter-chips">
            <button class="filter-chip active">All</button>
            <button class="filter-chip"> Library</button>

        <div>
            <button class="filter-chip">WiFi</button>

            <button class="filter-chip">Quiet</button>
        </div>

     <!-- spot cards grid -->
      <div id="spots-grid">

      </div>

     <!-- suggest a spot banner -->

     <div>
        <div>
            <strong>Can't find your spot?</strong>
            <p>Know a hidden gem? Submit it for review.</p>
        </div>
        <a href="/suggest.html" class="btn btn-outline">Add a spot →</a>

     <script type="module" src="/src/pages/campus.js"></script>
