<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/styles/main.css" />
    <link rel="stylesheet" href="/src/styles/navbar.css" />
    <link rel="stylesheet" href="/src/styles/campus.css" />
    <link rel="stylesheet" href="/src/styles/cards.css">
    <link rel="preconnect" href="https://fontshare.com" crossorigin>
    <link href="https://api.fontshare.com/v2/css?f[]=gambetta@400&f[]=general-sans@600&display=swap" rel="stylesheet">
    <title>StudyNook - Campus</title>
  </head>
  <body>
    <nav id="navbar"></nav>

    <!-- campus header -->
    <div class="campus-header">
        <div id="breadcrumb"></div>
        <h1 id= "campus-name"></h1>
        <div class="meta-count">
            <p id="campus-count"></p>
            <span>&#8226;</span>
            <p id="campus-meta"></p>
        </div>
    </div>

    <!-- filter bar -->
    <div class="filter-bar">
        <span class="filter-label">Filter:</span>
        <div class="filter-chips">
            <button class="filter-chip active" data-filter="all">All</button>
            <button class="filter-chip" data-filter="library"> Library</button>
            <button class="filter-chip" data-filter="cafe">Cafe</button>
            <button class="filter-chip" data-filter="outdoor">Outdoor</button>
            <button class="filter-chip" data-filter="common_area">Common Area</button>
        </div>
        <span class="divider">|</span>
        <div>
            <button class="filter-chip" data-filter="wifi">WiFi</button>
            <button class="filter-chip" data-filter="outlets">Outlets</button>
            <button class="filter-chip" data-filter="quiet">Quiet</button>
            <button class="filter-chip" data-filter="moderate">Moderate</button>
            <button class="filter-chip" data-filter="lively">Lively</button>
        </div>
    </div>

     <!-- spot cards grid -->
      <div class="spots-grid">

      </div>

     <!-- suggest a spot banner -->

     <div class="suggest-container">
        <div class="suggest-banner">
            <div class="suggest-banner-text">
                <strong>Can't find your spot?</strong>
                <p>Know a hidden gem? Submit it for review.</p>
            </div>
            <a href="/suggest.html" class="btn btn-outline">Add a spot →</a>
        </div>
     </div>

     <script type="module" src="/src/pages/campus.js"></script>
  </body>
</html>
