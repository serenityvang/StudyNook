<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/styles/main.css" />
    <link rel="stylesheet" href="/src/styles/navbar.css" />
    <link rel="stylesheet" href="/src/styles/cards.css" />
    <link rel="preconnecet" href="https://api.fontshare.com/v2/css?f[]=gambetta@400&f[]=general-sans@600&display=swap" rel="stylesheet" crossorigin>
    <title>StudyNook - Campus</title>
  </head>
  <body>
    <nav id="navbar"></nav>

    <!-- campus header -->
    <div class="campus-header">
        <div id="breadcrumb"></div>
        <h1 id= "campus-name"></h1>
        <div class="meta-count">
            <p id="campus-count"></p>
            <span>&#8226;</span>
            <p id="campus-meta"></p>
        </div>
    </div>

    <!-- filter bar -->
    <div class="filter-bar">
        <span class="filter-label">Filter:</span>
        <div class="filter-chips">
            <button class="filter-chip active">All</button>
            <button class="filter-chip"> Library</button>
            <button class="filter-chip">Cafe</button>
            <button class="filter-chip">Outdoor</button>
            <button class="filter-chip">Common Area</button>
        </div>
        <span class="divider">|</span>
        <div>
            <button class="filter-chip">WiFi</button>
            <button class="filter-chip">Outlets</button>
            <button class="filter-chip">Quiet</button>
        </div>
    </div>

     <!-- spot cards grid -->
      <div class="spots-grid">

      </div>

     <!-- suggest a spot banner -->

     <div>
        <div>
            <strong>Can't find your spot?</strong>
            <p>Know a hidden gem? Submit it for review.</p>
        </div>
        <a href="/suggest.html" class="btn btn-outline">Add a spot →</a>
     </div>

     <script type="module" src="/src/pages/campus.js"></script>
  </body>
</html>
